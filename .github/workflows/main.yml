name: Build Jarvis APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev python3-dev
          pip install --upgrade pip
          pip install --upgrade buildozer cython==0.29.33 setuptools

      - name: Build APK with Buildozer
        run: |
          yes | buildozer android debug
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-Mark-AI-APK
          path: bin/*.apk
